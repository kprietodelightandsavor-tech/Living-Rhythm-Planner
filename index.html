function todayName() {
  const d=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"][new Date().getDay()];
  return DAYS.includes(d)?d:"Monday";
}
function getWeekKey() {
  const now=new Date(),jan1=new Date(now.getFullYear(),0,1);
  return `${now.getFullYear()}-W${Math.ceil(((now-jan1)/86400000+jan1.getDay()+1)/7)}`;
}
function formatWeekRange() {
  const now=new Date(),day=now.getDay(),diff=now.getDate()-(day===0?6:day-1);
  const mon=new Date(new Date(now).setDate(diff));
  const fri=new Date(mon);fri.setDate(mon.getDate()+4);
  const f=d=>d.toLocaleDateString("en-US",{month:"numeric",day:"numeric"});
  return `${f(mon)} – ${f(fri)}`;
}

function makeDefaultStudents() {
  return [
    {id:1,name:"Nico",  loops:["beauty","math","language","core"],completions:{}},
    {id:2,name:"Emma",  loops:["beauty","math","language","core"],completions:{}},
    {id:3,name:"Marcos",loops:["math","language","core"],          completions:{}},
  ];
}
const BADGE_THRESHOLDS=[
  {count:1,emoji:"🌱",label:"First Bloom"},{count:5,emoji:"🌿",label:"Growing"},
  {count:10,emoji:"🌸",label:"Flourishing"},{count:25,emoji:"🌳",label:"Deep Roots"},
  {count:50,emoji:"🏆",label:"Master Scholar"},
];
function totalCompleted(s){return Object.values(s.completions).filter(Boolean).length;}
function getBadges(n){return BADGE_THRESHOLDS.filter(b=>n>=b.count);}
function nextBadge(n){return BADGE_THRESHOLDS.find(b=>n<b.count);}

// deep clone schedule
function cloneSched(s){
  return Object.fromEntries(Object.entries(s).map(([d,blocks])=>
    [d,blocks.map(b=>({...b,items:[...b.items],checks:{...b.checks}}))]
  ));
}

// day progress from checks inside blocks
function dayProgress(blocks){
  let total=0,done=0;
  blocks.forEach(b=>{ b.items.forEach((_,i)=>{ total++; if(b.checks[i]) done++; }); });
  return {total,done};
}

// ═════════════════════════════════════════════════════════════════════════════
// MAIN APP
// ═════════════════════════════════════════════════════════════════════════════
function App() {
  const [tab,             setTab]            = useState("trello");
  const [schedule,        setSchedule]       = useState(makeInitialSchedule);
  const [students,        setStudents]       = useState(makeDefaultStudents);
  const [activeStudentId, setActiveStudentId]= useState(null);
  const [newStudentName,  setNewStudentName] = useState("");
  const [weekKey,         setWeekKey]        = useState(getWeekKey());
  const [focusDay,        setFocusDay]       = useState(todayName());
  const [editMode,        setEditMode]       = useState(false);

  useEffect(()=>{
    const cur=getWeekKey();
    if(cur!==weekKey){
      setSchedule(s=>{ const n=cloneSched(s); Object.values(n).forEach(blocks=>blocks.forEach(b=>{b.checks={};})); return n; });
      setStudents(ss=>ss.map(s=>({...s,completions:{}})));
      setWeekKey(cur);
    }
  },[weekKey]);

  const activeStudent=students.find(s=>s.id===activeStudentId);

  // ── Schedule mutations ─────────────────────────────────────────────────────

  // Toggle a checkbox inside a block
  function toggleCheck(day,blockId,itemIdx){
    setSchedule(s=>{
      const blocks=s[day].map(b=>b.id!==blockId?b:{...b,checks:{...b.checks,[itemIdx]:!b.checks[itemIdx]}});
      return {...s,[day]:blocks};
    });
  }

  // Clear / check-all for a day
  function clearDay(day){
    setSchedule(s=>({...s,[day]:s[day].map(b=>({...b,checks:{}}))}));
  }
  function checkAllDay(day){
    setSchedule(s=>({...s,[day]:s[day].map(b=>{
      const checks={};b.items.forEach((_,i)=>{checks[i]=true;});return {...b,checks};
    })}));
  }

  // Edit block time
  function updateTime(day,blockId,time){
    setSchedule(s=>({...s,[day]:s[day].map(b=>b.id!==blockId?b:{...b,time})}));
  }

  // Edit block type
  function updateType(day,blockId,type){
    setSchedule(s=>({...s,[day]:s[day].map(b=>b.id!==blockId?b:{...b,type})}));
  }

  // Edit an item label
  function updateItem(day,blockId,idx,val){
    setSchedule(s=>({...s,[day]:s[day].map(b=>{
      if(b.id!==blockId) return b;
      const items=[...b.items]; items[idx]=val; return {...b,items};
    })}));
  }

  // Add item to block
  function addItem(day,blockId){
    setSchedule(s=>({...s,[day]:s[day].map(b=>b.id!==blockId?b:{...b,items:[...b.items,""]})}));
  }

  // Remove item from block
  function removeItem(day,blockId,idx){
    setSchedule(s=>({...s,[day]:s[day].map(b=>{
      if(b.id!==blockId) return b;
      const items=b.items.filter((_,i)=>i!==idx);
      const checks={};Object.entries(b.checks).forEach(([k,v])=>{const n=Number(k);if(n<idx)checks[k]=v;else if(n>idx)checks[String(n-1)]=v;});
      return {...b,items,checks};
    })}));
  }

  // Add a new block to a day
  function addBlock(day){
    setSchedule(s=>({...s,[day]:[...s[day],{id:uid(),time:"",type:"life",items:["New item"],checks:{}}]}));
  }

  // Remove a block
  function removeBlock(day,blockId){
    setSchedule(s=>({...s,[day]:s[day].filter(b=>b.id!==blockId)}));
  }

  // Move block: Trello-style — fromDay/fromIdx → toDay/toIdx
  function moveBlock(fromDay,fromIdx,toDay,toIdx){
    setSchedule(s=>{
      const n=cloneSched(s);
      const [block]=n[fromDay].splice(fromIdx,1);
      n[toDay].splice(toIdx,0,block);
      return n;
    });
  }

  // Students
  function addStudent(){
    if(!newStudentName.trim())return;
    setStudents(ss=>[...ss,{id:Date.now(),name:newStudentName.trim(),loops:["math","language"],completions:{}}]);
    setNewStudentName("");
  }
  function removeStudent(id){setStudents(ss=>ss.filter(s=>s.id!==id));}
  function toggleStudentLoop(id,loopId){
    setStudents(ss=>ss.map(s=>s.id!==id?s:{...s,
      loops:s.loops.includes(loopId)?s.loops.filter(l=>l!==loopId):[...s.loops,loopId]}));
  }
  function toggleCompletion(studentId,key){
    setStudents(ss=>ss.map(s=>s.id!==studentId?s:{...s,
      completions:{...s.completions,[key]:!s.completions[key]}}));
  }

  return (
    <div style={{fontFamily:"'Cormorant Garamond',serif",background:C.cream,minHeight:"100vh"}}>

      {/* ── Header ── */}
      <div style={{background:C.navy,padding:"13px 18px",display:"flex",
        alignItems:"center",justifyContent:"space-between",gap:10,flexWrap:"wrap"}}>
        <div>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:19,color:C.cream,letterSpacing:"0.04em"}}>
            Living Rhythm Planner
          </div>
          <div style={{fontSize:10,color:C.sageL,letterSpacing:"0.15em",textTransform:"uppercase",marginTop:1}}>
            {formatWeekRange()} · Delight & Savor
          </div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          {(tab==="trello"||tab==="day")&&(
            <button onClick={()=>setEditMode(e=>!e)}
              style={{background:editMode?C.gold:"none",
                border:`1px solid ${editMode?C.gold:C.sageL}`,
                color:editMode?C.navy:C.sageL,
                borderRadius:6,padding:"6px 13px",cursor:"pointer",
                fontFamily:"'Cormorant Garamond',serif",fontSize:12,
                letterSpacing:"0.04em",transition:"all .2s"}}>
              {editMode?"✓ Done editing":"✎ Edit"}
            </button>
          )}
          <a href="https://delightandsavor.com" target="_blank" rel="noreferrer"
            style={{background:"none",border:`1px solid ${C.sageL}`,color:C.sageL,
              borderRadius:6,padding:"6px 13px",cursor:"pointer",textDecoration:"none",
              fontFamily:"'Cormorant Garamond',serif",fontSize:12}}>
            ← D&S Home
          </a>
        </div>
      </div>

      {/* ── Tab bar ── */}
      {tab!=="dashboard"&&(
        <div style={{display:"flex",background:C.white,borderBottom:`2px solid ${C.borderL}`,padding:"0 16px"}}>
          {[["trello","📋 Weekly"],["day","📖 Day View"],["students","👦 Students"]].map(([key,label])=>(
            <button key={key} onClick={()=>setTab(key)}
              style={{fontFamily:"'Cormorant Garamond',serif",fontSize:14,letterSpacing:"0.04em",
                fontWeight:tab===key?600:400,color:tab===key?C.navy:C.slate,
                padding:"12px 16px",border:"none",background:"none",cursor:"pointer",
                borderBottom:tab===key?`3px solid ${C.gold}`:"3px solid transparent",
                marginBottom:-2,whiteSpace:"nowrap"}}>
              {label}
            </button>
          ))}
        </div>
      )}

      {tab==="trello"&&(
        <TrelloBoard
          schedule={schedule}
          editMode={editMode}
          onToggleCheck={toggleCheck}
          onMoveBlock={moveBlock}
          onAddBlock={addBlock}
          onRemoveBlock={removeBlock}
          onUpdateTime={updateTime}
          onUpdateType={updateType}
          onUpdateItem={updateItem}
          onAddItem={addItem}
          onRemoveItem={removeItem}
          onClearDay={clearDay}
          onCheckAll={checkAllDay}
          onDayClick={day=>{setFocusDay(day);setTab("day");}}
        />
      )}
      {tab==="day"&&(
        <DayView
          focusDay={focusDay} setFocusDay={setFocusDay}
          schedule={schedule} editMode={editMode}
          onToggleCheck={toggleCheck}
          onMoveBlock={moveBlock}
          onAddBlock={addBlock}
          onRemoveBlock={removeBlock}
          onUpdateTime={updateTime}
          onUpdateType={updateType}
          onUpdateItem={updateItem}
          onAddItem={addItem}
          onRemoveItem={removeItem}
          onClearDay={clearDay}
          onCheckAll={checkAllDay}
        />
      )}
      {tab==="students"&&(
        <StudentsTab students={students} newStudentName={newStudentName}
          setNewStudentName={setNewStudentName} addStudent={addStudent}
          removeStudent={removeStudent} toggleStudentLoop={toggleStudentLoop}
          onOpenDashboard={id=>{setActiveStudentId(id);setTab("dashboard");}}/>
      )}
      {tab==="dashboard"&&activeStudent&&(
        <StudentDashboard student={activeStudent} schedule={schedule}
          onToggle={key=>toggleCompletion(activeStudent.id,key)}
          onBack={()=>{setTab("students");setActiveStudentId(null);}}/>
      )}
    </div>
  );
}

// ═════════════════════════════════════════════════════════════════════════════
// TRELLO BOARD — day columns, draggable block cards
// ═════════════════════════════════════════════════════════════════════════════
function TrelloBoard({schedule,editMode,onToggleCheck,onMoveBlock,onAddBlock,
  onRemoveBlock,onUpdateTime,onUpdateType,onUpdateItem,onAddItem,onRemoveItem,
  onClearDay,onCheckAll,onDayClick}) {

  const today=todayName();
  const drag=useRef(null); // {day,idx}
  const [dragOver,setDragOver]=useState(null); // {day,idx}

  function handleDragStart(e,day,idx){
    drag.current={day,idx};
    e.dataTransfer.effectAllowed="move";
  }
  function handleDragOver(e,day,idx){
    e.preventDefault();
    if(!drag.current) return;
    if(dragOver?.day!==day||dragOver?.idx!==idx) setDragOver({day,idx});
  }
  function handleDrop(e,toDay,toIdx){
    e.preventDefault();
    if(!drag.current) return;
    const {day:fromDay,idx:fromIdx}=drag.current;
    if(fromDay===toDay&&fromIdx===toIdx){drag.current=null;setDragOver(null);return;}
    onMoveBlock(fromDay,fromIdx,toDay,toIdx);
    drag.current=null;setDragOver(null);
  }
  function handleDragEnd(){drag.current=null;setDragOver(null);}

  return (
    <div style={{padding:"14px 12px 32px",overflowX:"auto"}}>
      {/* Legend */}
      <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:14}}>
        {Object.entries(BLOCK_TYPES).map(([key,col])=>(
          <div key={key} style={{display:"flex",alignItems:"center",gap:4,
            background:col.bg,border:`1px solid ${col.border}`,borderRadius:14,padding:"2px 9px"}}>
            <span style={{fontSize:10,color:col.text,fontFamily:"'Cormorant Garamond',serif"}}>{col.label}</span>
          </div>
        ))}
        {editMode&&<span style={{fontSize:11,color:C.gold,fontStyle:"italic",alignSelf:"center",marginLeft:6}}>
          ✎ Edit mode on — drag cards, click to edit
        </span>}
      </div>

      {/* Columns */}
      <div style={{display:"flex",gap:10,alignItems:"flex-start",minWidth:700}}>
        {DAYS.map((day,di)=>{
          const blocks=schedule[day]||[];
          const isToday=day===today;
          const {done,total}=dayProgress(blocks);

          return (
            <div key={day} style={{flex:1,minWidth:0,display:"flex",flexDirection:"column"}}>
              {/* Column header */}
              <div
                onClick={()=>onDayClick(day)}
                style={{background:isToday?C.gold:C.navy,
                  borderRadius:"10px 10px 0 0",padding:"10px 10px 8px",
                  cursor:"pointer",userSelect:"none",textAlign:"center"}}>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:13,fontWeight:700,
                  color:isToday?C.navy:C.cream}}>{SHORT[di]}</div>
                <div style={{fontSize:10,color:isToday?C.navyL:C.sageL,marginTop:1}}>{day}</div>
                {isToday&&<div style={{fontSize:8,letterSpacing:"0.12em",color:C.navyL,textTransform:"uppercase",marginTop:1}}>Today</div>}
                {total>0&&(
                  <div style={{marginTop:5}}>
                    <div style={{background:"rgba(255,255,255,0.22)",borderRadius:4,height:3,overflow:"hidden"}}>
                      <div style={{background:isToday?C.navy:C.gold,height:"100%",
                        borderRadius:4,transition:"width .3s",width:`${(done/total)*100}%`}}/>
                    </div>
                    <div style={{fontSize:9,color:isToday?C.navy:C.goldL,marginTop:2}}>{done}/{total}</div>
                  </div>
                )}
              </div>

              {/* Quick actions */}
              <div style={{background:isToday?"rgba(201,168,76,0.08)":C.creamy,
                borderLeft:`1px solid ${C.border}`,borderRight:`1px solid ${C.border}`,
                padding:"4px 8px",display:"flex",gap:6,justifyContent:"flex-end"}}>
                <button onClick={()=>onCheckAll(day)}
                  style={{background:"none",border:"none",fontSize:10,color:C.sage,cursor:"pointer",
                    fontFamily:"'Cormorant Garamond',serif",padding:"1px 4px"}}>✓ all</button>
                <button onClick={()=>onClearDay(day)}
                  style={{background:"none",border:"none",fontSize:10,color:C.slateL,cursor:"pointer",
                    fontFamily:"'Cormorant Garamond',serif",padding:"1px 4px"}}>↺ clear</button>
              </div>

              {/* Cards column */}
              <div
                onDragOver={e=>{e.preventDefault();setDragOver({day,idx:blocks.length});}}
                onDrop={e=>handleDrop(e,day,blocks.length)}
                style={{background:isToday?"rgba(201,168,76,0.04)":C.white,
                  border:`1px solid ${C.border}`,borderTop:"none",
                  borderRadius:"0 0 10px 10px",
                  padding:"6px 6px 8px",minHeight:120,flex:1}}>

                {blocks.map((block,idx)=>{
                  const col=BLOCK_TYPES[block.type]||BLOCK_TYPES.life;
                  const isDragTarget=dragOver?.day===day&&dragOver?.idx===idx;
                  const isDragging=drag.current?.day===day&&drag.current?.idx===idx;

                  return (
                    <div key={block.id}>
                      {/* Drop indicator above */}
                      {isDragTarget&&(
                        <div style={{height:3,background:C.gold,borderRadius:4,margin:"2px 0",transition:"all .1s"}}/>
                      )}
                      <TrelloCard
                        block={block} col={col} editMode={editMode}
                        isDragging={isDragging}
                        onDragStart={e=>handleDragStart(e,day,idx)}
                        onDragOver={e=>handleDragOver(e,day,idx)}
                        onDrop={e=>handleDrop(e,day,idx)}
                        onDragEnd={handleDragEnd}
                        onToggleCheck={itemIdx=>onToggleCheck(day,block.id,itemIdx)}
                        onUpdateTime={t=>onUpdateTime(day,block.id,t)}
                        onUpdateType={t=>onUpdateType(day,block.id,t)}
                        onUpdateItem={(i,v)=>onUpdateItem(day,block.id,i,v)}
                        onAddItem={()=>onAddItem(day,block.id)}
                        onRemoveItem={i=>onRemoveItem(day,block.id,i)}
                        onRemove={()=>onRemoveBlock(day,block.id)}
                      />
                    </div>
                  );
                })}

                {/* Drop zone at bottom */}
                {dragOver?.day===day&&dragOver?.idx===blocks.length&&(
                  <div style={{height:3,background:C.gold,borderRadius:4,margin:"4px 0"}}/>
                )}

                {editMode&&(
                  <button onClick={()=>onAddBlock(day)}
                    style={{width:"100%",marginTop:6,background:"none",
                      border:`1px dashed ${C.border}`,borderRadius:7,
                      padding:"7px",fontSize:12,color:C.slateL,cursor:"pointer",
                      fontFamily:"'Cormorant Garamond',serif"}}>
                    + add block
                  </button>
                )}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── Trello card ───────────────────────────────────────────────────────────────
function TrelloCard({block,col,editMode,isDragging,onDragStart,onDragOver,onDrop,
  onDragEnd,onToggleCheck,onUpdateTime,onUpdateType,onUpdateItem,onAddItem,
  onRemoveItem,onRemove}) {

  const [collapsed,   setCollapsed]   = useState(false);
  const [editingTime, setEditingTime] = useState(false);
  const [timeVal,     setTimeVal]     = useState(block.time);
  const [showTypeMenu,setShowTypeMenu]= useState(false);

  // Keep timeVal in sync if block.time changes externally
  useEffect(()=>{ setTimeVal(block.time); },[block.time]);

  const doneCount = block.items.filter((_,i)=>block.checks[i]).length;
  const totalCount = block.items.length;
  const allDone = doneCount===totalCount && totalCount>0;

  return (
    <div
      draggable={editMode}
      onDragStart={editMode?onDragStart:undefined}
      onDragOver={onDragOver}
      onDrop={onDrop}
      onDragEnd={onDragEnd}
      style={{
        background: col.bg,
        border: `1.5px solid ${col.border}`,
        borderRadius: 8,
        marginBottom: 6,
        opacity: isDragging ? 0.35 : allDone ? 0.7 : 1,
        cursor: editMode ? "grab" : "default",
        boxShadow: isDragging ? "none" : "0 1px 4px rgba(0,0,0,0.08)",
        transition: "opacity .2s",
        overflow: "hidden",         // ← clips all children
        userSelect: "none",
      }}>

      {/* ── Row 1: type label + progress + collapse + delete ── */}
      <div style={{
        background: col.border,
        padding: "5px 8px",
        display: "flex",
        alignItems: "center",
        gap: 6,
        minWidth: 0,
      }}>
        {/* Drag grip */}
        {editMode && (
          <span style={{color:"rgba(255,255,255,0.55)",fontSize:13,cursor:"grab",flexShrink:0,lineHeight:1}}>
            ⠿
          </span>
        )}

        {/* Type label / selector */}
        <div style={{flex:1,minWidth:0,position:"relative"}}>
          {editMode ? (
            <>
              <button onClick={()=>setShowTypeMenu(m=>!m)}
                style={{background:"rgba(255,255,255,0.18)",border:"none",borderRadius:4,
                  padding:"2px 7px",cursor:"pointer",fontSize:11,color:"rgba(255,255,255,0.95)",
                  fontFamily:"'Cormorant Garamond',serif",fontWeight:600,
                  letterSpacing:"0.04em",whiteSpace:"nowrap"}}>
                {BLOCK_TYPES[block.type]?.label||block.type} ▾
              </button>
              {showTypeMenu&&(
                <div style={{position:"absolute",left:0,top:"100%",zIndex:50,
                  background:C.white,border:`1px solid ${C.border}`,borderRadius:8,
                  boxShadow:"0 6px 20px rgba(0,0,0,0.18)",overflow:"hidden",minWidth:150}}>
                  {Object.entries(BLOCK_TYPES).map(([key,tc])=>(
                    <div key={key} onClick={()=>{onUpdateType(key);setShowTypeMenu(false);}}
                      style={{padding:"7px 13px",fontSize:12,cursor:"pointer",
                        color:tc.text,background:tc.bg,
                        borderBottom:`1px solid ${C.borderL}`,
                        fontFamily:"'Cormorant Garamond',serif"}}>
                      {tc.label}
                    </div>
                  ))}
                </div>
              )}
            </>
          ):(
            <span style={{fontSize:11,color:"rgba(255,255,255,0.85)",
              fontFamily:"'Cormorant Garamond',serif",fontWeight:600,
              letterSpacing:"0.05em",textTransform:"uppercase"}}>
              {BLOCK_TYPES[block.type]?.label||block.type}
            </span>
          )}
        </div>

        {/* Progress */}
        {totalCount>0&&(
          <span style={{fontSize:10,color:"rgba(255,255,255,0.75)",flexShrink:0}}>
            {doneCount}/{totalCount}
          </span>
        )}

        {/* Collapse */}
        <button onClick={()=>setCollapsed(c=>!c)}
          style={{background:"none",border:"none",cursor:"pointer",
            color:"rgba(255,255,255,0.8)",fontSize:12,padding:"0 1px",
            lineHeight:1,flexShrink:0}}>
          {collapsed?"▶":"▼"}
        </button>

        {/* Delete (edit mode only) */}
        {editMode&&(
          <button onClick={onRemove}
            style={{background:"none",border:"none",cursor:"pointer",
              color:"rgba(255,255,255,0.55)",fontSize:14,padding:"0 1px",
              lineHeight:1,flexShrink:0}}>
            ✕
          </button>
        )}
      </div>

      {/* ── Row 2: time ── */}
      <div style={{
        background:"rgba(0,0,0,0.08)",
        padding:"3px 10px",
        borderBottom:`1px solid ${col.border}44`,
        minWidth:0,
      }}>
        {editingTime?(
          <input
            autoFocus
            value={timeVal}
            onChange={e=>setTimeVal(e.target.value)}
            onBlur={()=>{onUpdateTime(timeVal);setEditingTime(false);}}
            onKeyDown={e=>{if(e.key==="Enter"){onUpdateTime(timeVal);setEditingTime(false);}}}
            style={{background:"transparent",border:"none",outline:"none",
              fontSize:11,color:col.text,width:"100%",
              fontFamily:"'Cormorant Garamond',serif",fontStyle:"italic"}}
          />
        ):(
          <span
            onClick={editMode?()=>{setTimeVal(block.time);setEditingTime(true);}:undefined}
            style={{fontSize:11,color:col.text,opacity:0.75,
              fontFamily:"'Cormorant Garamond',serif",fontStyle:"italic",
              cursor:editMode?"text":"default",
              borderBottom:editMode?`1px dashed ${col.border}`:"none",
              display:"inline-block"}}>
            {block.time||(editMode?<span style={{opacity:0.45}}>+ add time</span>:"—")}
          </span>
        )}
      </div>

      {/* ── Card body: checklist ── */}
      {!collapsed&&(
        <div style={{padding:"6px 8px 7px"}}>
          {block.items.map((item,idx)=>(
            <div key={idx} style={{
              display:"flex",alignItems:"flex-start",gap:8,
              padding:"4px 0",
              borderBottom:idx<block.items.length-1?`1px solid ${col.border}22`:"none",
            }}>
              {/* Checkbox */}
              <div onClick={()=>onToggleCheck(idx)}
                style={{width:15,height:15,borderRadius:3,flexShrink:0,
                  marginTop:2,cursor:"pointer",
                  border:`1.5px solid ${block.checks[idx]?col.border:C.border}`,
                  background:block.checks[idx]?col.border:C.white,
                  display:"flex",alignItems:"center",justifyContent:"center",
                  transition:"all .15s"}}>
                {block.checks[idx]&&<span style={{color:C.white,fontSize:9,lineHeight:1}}>✓</span>}
              </div>

              {/* Label */}
              {editMode?(
                <input
                  value={item}
                  onChange={e=>onUpdateItem(idx,e.target.value)}
                  style={{flex:1,minWidth:0,background:"transparent",
                    border:"none",borderBottom:`1px dashed ${col.border}`,
                    fontSize:12,color:col.text,padding:"0 2px",outline:"none",
                    fontFamily:"'Cormorant Garamond',serif",lineHeight:1.4}}
                />
              ):(
                <span style={{
                  flex:1,minWidth:0,
                  fontSize:12,color:col.text,lineHeight:1.4,
                  wordBreak:"break-word",          // ← text wraps inside card
                  overflowWrap:"break-word",
                  textDecoration:block.checks[idx]?"line-through":"none",
                  opacity:block.checks[idx]?0.5:1,
                  fontFamily:"'Cormorant Garamond',serif",
                }}>
                  {item}
                </span>
              )}

              {editMode&&(
                <button onClick={()=>onRemoveItem(idx)}
                  style={{background:"none",border:"none",cursor:"pointer",
                    color:col.border,fontSize:13,padding:0,flexShrink:0,
                    lineHeight:1,marginTop:1}}>
                  ×
                </button>
              )}
            </div>
          ))}

          {editMode&&(
            <button onClick={onAddItem}
              style={{marginTop:6,background:"none",border:"none",cursor:"pointer",
                fontSize:11,color:col.border,fontFamily:"'Cormorant Garamond',serif",
                padding:"1px 0",letterSpacing:"0.04em",display:"block"}}>
              + add item
            </button>
          )}
        </div>
      )}
    </div>
  );
}

// DAY VIEW — focused single day, same cards
// ═════════════════════════════════════════════════════════════════════════════
function DayView({focusDay,setFocusDay,schedule,editMode,onToggleCheck,onMoveBlock,
  onAddBlock,onRemoveBlock,onUpdateTime,onUpdateType,onUpdateItem,onAddItem,
  onRemoveItem,onClearDay,onCheckAll}) {
  const today=todayName();
  const blocks=schedule[focusDay]||[];
  const {done,total}=dayProgress(blocks);

  return (
    <div style={{padding:"16px 14px 40px",maxWidth:480,margin:"0 auto"}}>
      {/* Day pills */}
      <div style={{display:"flex",gap:5,marginBottom:16,justifyContent:"center"}}>
        {DAYS.map(day=>{
          const isSel=day===focusDay,isToday=day===today;
          const {done:d,total:t}=dayProgress(schedule[day]||[]);
          return (
            <button key={day} onClick={()=>setFocusDay(day)}
              style={{flex:1,background:isSel?C.navy:isToday?C.goldPale:C.white,
                border:`2px solid ${isSel?C.navy:isToday?C.gold:C.border}`,
                borderRadius:8,padding:"7px 2px",cursor:"pointer"}}>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:11,fontWeight:700,
                color:isSel?C.cream:isToday?C.navy:C.slate}}>{day.slice(0,3)}</div>
              {t>0&&<div style={{fontSize:9,color:isSel?C.sageL:C.slateL,marginTop:1}}>{d}/{t}</div>}
            </button>
          );
        })}
      </div>

      {/* Day title + actions */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
        <div>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:22,color:C.navy}}>{focusDay}</div>
          {focusDay===today&&<div style={{fontSize:10,color:C.gold,letterSpacing:"0.1em",textTransform:"uppercase"}}>Today</div>}
        </div>
        <div style={{display:"flex",gap:7}}>
          <button onClick={()=>onCheckAll(focusDay)}
            style={{background:C.sagePale,border:`1px solid ${C.sage}`,color:C.sage,
              borderRadius:6,padding:"5px 11px",cursor:"pointer",fontSize:12,
              fontFamily:"'Cormorant Garamond',serif"}}>✓ All</button>
          <button onClick={()=>onClearDay(focusDay)}
            style={{background:"none",border:`1px solid ${C.border}`,color:C.slateL,
              borderRadius:6,padding:"5px 11px",cursor:"pointer",fontSize:12,
              fontFamily:"'Cormorant Garamond',serif"}}>↺ Clear</button>
        </div>
      </div>

      {/* Progress */}
      {total>0&&(
        <div style={{marginBottom:16}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
            <span style={{fontSize:13,color:C.slate}}>Day Progress</span>
            <span style={{fontSize:13,color:done===total?C.sage:C.gold,fontWeight:600}}>
              {done}/{total}{done===total?" ✦":""}
            </span>
          </div>
          <div style={{background:C.borderL,borderRadius:8,height:8,overflow:"hidden"}}>
            <div style={{background:done===total?C.sage:C.gold,height:"100%",
              borderRadius:8,transition:"width .4s",width:`${(done/total)*100}%`}}/>
          </div>
        </div>
      )}

      {/* Cards */}
      {blocks.map((block,idx)=>{
        const col=BLOCK_TYPES[block.type]||BLOCK_TYPES.life;
        return (
          <TrelloCard key={block.id}
            block={block} col={col} editMode={editMode}
            isDragging={false}
            onDragStart={()=>{}} onDragOver={()=>{}} onDrop={()=>{}} onDragEnd={()=>{}}
            onToggleCheck={itemIdx=>onToggleCheck(focusDay,block.id,itemIdx)}
            onUpdateTime={t=>onUpdateTime(focusDay,block.id,t)}
            onUpdateType={t=>onUpdateType(focusDay,block.id,t)}
            onUpdateItem={(i,v)=>onUpdateItem(focusDay,block.id,i,v)}
            onAddItem={()=>onAddItem(focusDay,block.id)}
            onRemoveItem={i=>onRemoveItem(focusDay,block.id,i)}
            onRemove={()=>onRemoveBlock(focusDay,block.id)}
          />
        );
      })}

      {editMode&&(
        <button onClick={()=>onAddBlock(focusDay)}
          style={{width:"100%",marginTop:8,background:"none",
            border:`1px dashed ${C.border}`,borderRadius:8,
            padding:"9px",fontSize:13,color:C.slateL,cursor:"pointer",
            fontFamily:"'Cormorant Garamond',serif"}}>
          + add block
        </button>
      )}

      {done===total&&total>0&&(
        <div style={{marginTop:18,textAlign:"center",padding:"22px",
          background:C.sagePale,borderRadius:12,border:`1px solid ${C.sageL}`}}>
          <div style={{fontSize:34,marginBottom:6}}>🌿</div>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:19,color:C.navy}}>
            {focusDay} complete!
          </div>
          <div style={{fontSize:13,color:C.slate,fontStyle:"italic",marginTop:3}}>
            Beauty. Meaning. Connection.
          </div>
        </div>
      )}
    </div>
  );
}

  ];
  return (
    <div style={{padding:"22px 18px",maxWidth:580,margin:"0 auto"}}>
      <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:C.navy,marginBottom:4}}>

      <div style={{display:"flex",gap:10,marginBottom:22}}>

            fontFamily:"'Cormorant Garamond',serif",fontSize:15,outline:"none",
            background:C.cream,color:C.navy}}/>
        <button onClick={addStudent}
          style={{background:C.navy,border:"none",borderRadius:8,padding:"9px 20px",
            color:C.cream,fontFamily:"'Playfair Display',serif",fontSize:14,cursor:"pointer"}}>
          Add
        </button>
      </div>
      {students.map(student=>{
        const done=totalCompleted(student),badges=getBadges(done),isOpen=expanded===student.id;
        return (
          <div key={student.id} style={{background:C.white,border:`1px solid ${C.border}`,
            borderRadius:12,marginBottom:10,overflow:"hidden",

                  {student.loops.length} loops
                  {done>0&&` · ${done} completed`}
                  {badges.length>0&&" "+badges[badges.length-1].emoji}

              </div>
              <button onClick={()=>onOpenDashboard(student.id)}

                  color:C.navy,fontFamily:"'Playfair Display',serif",fontSize:13,
                  fontWeight:700,cursor:"pointer"}}>Open →</button>
              <button onClick={()=>setExpanded(isOpen?null:student.id)}
                style={{background:"none",border:`1px solid ${C.border}`,color:C.slate,
                  borderRadius:6,padding:"6px 9px",cursor:"pointer",fontSize:12}}>
                {isOpen?"▲":"▼"}
              </button>
            </div>
            {isOpen&&(
              <div style={{borderTop:`1px solid ${C.borderL}`,padding:"12px 16px",background:C.sagePale}}>
                <div style={{fontSize:11,color:C.navy,fontWeight:600,marginBottom:9,
                  letterSpacing:"0.08em",textTransform:"uppercase"}}>Assigned Loops</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:12}}>
                  {LOOPS.map(l=>{
                    const on=student.loops.includes(l.id);
                    return (
                      <div key={l.id} onClick={()=>toggleStudentLoop(student.id,l.id)}
                        style={{background:on?l.hdr:C.white,border:`1.5px solid ${on?l.hdr:C.border}`,
                          borderRadius:20,padding:"5px 14px",fontSize:13,
                          color:on?l.hdrT:C.slate,cursor:"pointer",userSelect:"none",
                          transition:"all .15s",fontFamily:"'Cormorant Garamond',serif"}}>
                        {l.icon} {l.label}
                      </div>
                    );
                  })}
                </div>
                <button onClick={()=>removeStudent(student.id)}
                  style={{background:"none",border:"none",color:"#A03030",fontSize:12,
                    cursor:"pointer",fontFamily:"'Cormorant Garamond',serif"}}>
                  Remove student
                </button>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// STUDENT DASHBOARD
// ═════════════════════════════════════════════════════════════════════════════
function StudentDashboard({student,schedule,onToggle,onBack}) {
  const today=todayName();
  const [view,setView]=useState("today");
  const done=totalCompleted(student),badges=getBadges(done),next=nextBadge(done);

  const LOOP_TYPES={beauty:["beauty"],math:["math"],language:["language","morning"],core:["core","nature"]};

  function getStudentBlocks(day){
    return (schedule[day]||[]).filter(b=>
      student.loops.some(lid=>(LOOP_TYPES[lid]||[]).includes(b.type))
    );
  }

  const todayBlocks=getStudentBlocks(today);
  const todayItems=todayBlocks.flatMap((b,bi)=>
    b.items.map((item,ii)=>({item,key:`${today}|${b.id}|${ii}`}))
  );
  const totalToday=todayItems.length;
  const doneToday=todayItems.filter(({key})=>student.completions[key]).length;

  return (
    <div style={{minHeight:"100vh",background:C.cream}}>
      <div style={{background:C.navy,padding:"18px 18px 24px"}}>
        <button onClick={onBack}
          style={{background:"none",border:`1px solid ${C.sageL}`,color:C.sageL,
            borderRadius:6,padding:"4px 11px",cursor:"pointer",
            fontFamily:"'Cormorant Garamond',serif",fontSize:11,marginBottom:12}}>
          ← Back
        </button>
        <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:14}}>
          <Avatar name={student.name} size={48} gold/>
          <div>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:21,color:C.cream}}>
              {student.name}'s Day
            </div>
            <div style={{fontSize:11,color:C.sageL,fontStyle:"italic",marginTop:2}}>
              {new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})}
            </div>
          </div>
        </div>
        {totalToday>0&&(
          <>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
              <span style={{fontSize:12,color:C.sageL}}>Today's Progress</span>
              <span style={{fontSize:12,color:C.goldL,fontWeight:600}}>{doneToday}/{totalToday}</span>
            </div>
            <div style={{background:"rgba(255,255,255,0.12)",borderRadius:8,height:8,overflow:"hidden"}}>
              <div style={{background:`linear-gradient(90deg,${C.gold},${C.goldL})`,height:"100%",
                borderRadius:8,transition:"width .5s",
                width:`${totalToday>0?(doneToday/totalToday)*100:0}%`}}/>
            </div>
          </>
        )}
        {badges.length>0&&(
          <div style={{display:"flex",gap:7,marginTop:10,flexWrap:"wrap"}}>
            {badges.map(b=>(
              <div key={b.label} style={{background:"rgba(201,168,76,0.22)",
                border:`1px solid ${C.gold}`,borderRadius:20,
                padding:"2px 11px",fontSize:11,color:C.goldL}}>
                {b.emoji} {b.label}
              </div>
            ))}
          </div>
        )}
        {next&&done>0&&(
          <div style={{fontSize:11,color:C.slateL,marginTop:5,fontStyle:"italic"}}>
            {next.count-done} more to earn {next.emoji} {next.label}
          </div>
        )}
      </div>

      <div style={{display:"flex",background:C.white,borderBottom:`1px solid ${C.borderL}`}}>
        {[["today","📖 Today"],["week","📅 This Week"]].map(([key,label])=>(
          <button key={key} onClick={()=>setView(key)}
            style={{flex:1,padding:"11px",border:"none",background:"none",cursor:"pointer",
              fontFamily:"'Cormorant Garamond',serif",fontSize:14,
              color:view===key?C.navy:C.slate,fontWeight:view===key?600:400,
              borderBottom:view===key?`3px solid ${C.gold}`:"3px solid transparent"}}>
            {label}
          </button>
        ))}
      </div>

      <div style={{padding:"14px 14px 30px"}}>
        {view==="today"&&(
          <div>
            {todayBlocks.length===0&&(
              <div style={{textAlign:"center",color:C.slateL,fontStyle:"italic",padding:"28px 0"}}>
                No lessons assigned for today.
              </div>
            )}
            {todayBlocks.map(block=>{
              const col=BLOCK_TYPES[block.type]||BLOCK_TYPES.life;
              return (
                <div key={block.id} style={{background:col.bg,border:`1.5px solid ${col.border}`,
                  borderRadius:10,marginBottom:10,overflow:"hidden"}}>
                  <div style={{background:col.border,padding:"6px 12px"}}>
                    <span style={{fontSize:11,color:"rgba(255,255,255,0.9)",
                      fontFamily:"'Cormorant Garamond',serif"}}>
                      {block.time&&`${block.time} · `}{BLOCK_TYPES[block.type]?.label}
                    </span>
                  </div>
                  <div style={{padding:"6px 10px"}}>
                    {block.items.map((item,ii)=>{
                      const key=`${today}|${block.id}|${ii}`;
                      const checked=!!student.completions[key];
                      return (
                        <div key={ii} onClick={()=>onToggle(key)}
                          style={{display:"flex",alignItems:"center",gap:10,padding:"7px 4px",
                            cursor:"pointer",borderRadius:6,
                            borderBottom:ii<block.items.length-1?`1px solid ${col.border}22`:"none"}}>
                          <div style={{width:20,height:20,borderRadius:"50%",flexShrink:0,
                            border:`1.5px solid ${checked?col.border:C.border}`,
                            background:checked?col.border:C.white,
                            display:"flex",alignItems:"center",justifyContent:"center",
                            transition:"all .2s"}}>
                            {checked&&<span style={{color:C.white,fontSize:11}}>✓</span>}
                          </div>
                          <span style={{fontFamily:"'Playfair Display',serif",fontSize:14,color:C.navy,
                            textDecoration:checked?"line-through":"none",opacity:checked?0.5:1}}>
                            {item}
                          </span>
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}
            {doneToday===totalToday&&totalToday>0&&(
              <div style={{marginTop:14,textAlign:"center",padding:"20px",
                background:C.sagePale,borderRadius:12,border:`1px solid ${C.sageL}`}}>
                <div style={{fontSize:32,marginBottom:6}}>🎉</div>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,color:C.navy}}>
                  All done, {student.name}!
                </div>
                <div style={{fontSize:13,color:C.slate,fontStyle:"italic",marginTop:2}}>
                  Beauty. Meaning. Connection.
                </div>
              </div>
            )}
          </div>
        )}
        {view==="week"&&(
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {DAYS.map(day=>{
              const isToday=day===today;
              const dayBlocks=getStudentBlocks(day);
              const items=dayBlocks.flatMap((b)=>b.items.map((item,ii)=>({item,key:`${day}|${b.id}|${ii}`})));
              const d=items.filter(({key})=>student.completions[key]).length;
              return (
                <div key={day} style={{background:C.white,
                  border:isToday?`2px solid ${C.gold}`:`1px solid ${C.border}`,
                  borderRadius:10,padding:"10px 12px",
                  boxShadow:isToday?`0 2px 8px rgba(201,168,76,0.18)`:"none"}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:items.length>0?7:0}}>
                    <span style={{fontFamily:"'Playfair Display',serif",fontSize:13,color:C.navy}}>
                      {day}{isToday&&<span style={{fontSize:10,color:C.gold,fontStyle:"italic",marginLeft:5}}> · Today</span>}
                    </span>
                    <span style={{fontSize:11,color:d===items.length&&items.length>0?C.sage:C.slateL}}>
                      {d}/{items.length}{d===items.length&&items.length>0?" ✓":""}
                    </span>
                  </div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                    {items.map(({item,key})=>{
                      const checked=!!student.completions[key];
                      return (
                        <div key={key} onClick={()=>onToggle(key)}
                          style={{background:checked?C.sagePale:C.creamy,
                            border:`1px solid ${checked?C.sage:C.border}`,
                            borderRadius:16,padding:"3px 11px",fontSize:12,
                            color:checked?C.navy:C.slate,cursor:"pointer",
                            textDecoration:checked?"line-through":"none",
                            display:"flex",alignItems:"center",gap:4,
                            fontFamily:"'Cormorant Garamond',serif",transition:"all .15s"}}>
                          {checked&&<span style={{color:C.sage,fontSize:10}}>✓</span>}
                          {item}
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

// ── Shared ────────────────────────────────────────────────────────────────────
function Avatar({name,size,gold}) {
  return (
    <div style={{width:size,height:size,borderRadius:"50%",
      background:gold?C.navyL:C.sagePale,border:`2px solid ${gold?C.gold:C.sage}`,
      display:"flex",alignItems:"center",justifyContent:"center",
      fontFamily:"'Playfair Display',serif",fontSize:size*0.42,
      color:gold?C.goldL:C.navy,flexShrink:0}}>
      {name[0]}
    </div>
  );
}
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
